- name: ASP.NET_SessionId
  category: session_mechanism
  source: cookies
  match: regex
  pattern: "ASP\\.NET_SessionId"
  confidence: high
  security_relevance: "Legacy ASP.NET session cookie present."
  manual_follow_up: "Check Secure/HttpOnly/SameSite flags and session fixation behavior."
- name: .ASPXAUTH
  category: session_mechanism
